<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忍者</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background: #222;
            padding: 30px;
        }
        h1 {
            color: #ffaa00;
            font-size: 45px;
            text-align: center;
            margin-bottom: 40px;
        }
        .box-btn {
            display: block;
            margin: 0 auto 40px;
            padding: 15px 45px;
            font-size: 19px;
            background: #ff9900;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .box-btn:hover {
            background: #ff7700;
        }
        #text {
            font-size: 22px;
            color: #fff;
            text-align: center;
            margin-bottom: 50px;
        }
        /* 20张图片网格布局 */
        .img-container{
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .img-item{
            width: 100%;
            height: 160px;
            background: #333;
            border: 2px dashed #ffaa00;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
        }
        .img-item img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>忍者</h1>
    <button class="box-btn">开启忍者之力</button>
    <div id="text"></div>

    <!-- 已按你提供的图片名称填好src -->
    <div class="img-container">
        <div class="img-item"><img src="双神威卡卡西(1).png" alt="双神威卡卡西"></div>
        <div class="img-item"><img src="天道超(1).png" alt="天道超"></div>
        <div class="img-item"><img src="带土(1).png" alt="带土"></div>
        <div class="img-item"><img src="止水(1).png" alt="止水"></div>
        <div class="img-item"><img src="死二(1).png" alt="死二"></div>

        <div class="img-item"><img src="死柱(1).png" alt="死柱"></div>
        <div class="img-item"><img src="死水(1).png" alt="死水"></div>
        <div class="img-item"><img src="永恒佐助(1).png" alt="永恒佐助"></div>
        <div class="img-item"><img src="白面具(1).png" alt="白面具"></div>
        <div class="img-item"><img src="鼬(1).png" alt="鼬"></div>
    </div>

    <script>
        let txt = document.getElementById("text");
        document.querySelector(".box-btn").addEventListener("click",()=>{
            txt.innerText = "成功解锁专属忍者身份！";
        })
    </script>
</body>
</html>
