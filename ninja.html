<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忍者</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background: #222;
            padding: 30px;
        }
        h1 {
            color: #ffaa00;
            font-size: 45px;
            text-align: center;
            margin-bottom: 40px;
        }
        #text {
            display: none; /* 隐藏文字区域 */
        }
        .img-container{
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        .img-item{
            width: 150px;
            height: 150px;
            background: #333;
            border: 2px dashed #ffaa00;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        /* 只保留悬浮发光效果 */
        .img-item:hover{
            transform: scale(1.05);
            border-color: #ffdd00;
            box-shadow: 0 0 15px #ffaa00;
        }
        .img-item img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <h1>忍者</h1>
    <div id="text"></div>

    <div class="img-container">
        <div class="img-item" data-name="双神威旗木卡卡西" onclick="location.href='kaxi.html'"><img src="双神威卡卡西(1).png" alt=""></div>
        <div class="img-item" data-name="天道超" onclick="location.href='tiandao.html'"><img src="天道超(1).png" alt=""></div>
        <div class="img-item" data-name="宇智波带土" onclick="location.href='daitu.html'"><img src="带土(1).png" alt=""></div>
        <div class="img-item" data-name="宇智波止水" onclick="location.href='zhishui.html'"><img src="止水(1).png" alt=""></div>
        <div class="img-item" data-name="秽土转生千手扉间" onclick="location.href='sier.html'"><img src="死二(1).png" alt=""></div>

        <div class="img-item" data-name="秽土转生千手柱间" onclick="location.href='sizhu.html'"><img src="死柱(1).png" alt=""></div>
        <div class="img-item" data-name="秽土转生波风水门" onclick="location.href='sishui.html'"><img src="死水(1).png" alt=""></div>
        <div class="img-item" data-name="宇智波佐助永恒万花筒" onclick="location.href='zuozhu.html'"><img src="永恒佐助(1).png" alt=""></div>
        <div class="img-item" data-name="宇智波斑白面具" onclick="location.href='baimianju.html'"><img src="白面具(1).png" alt=""></div>
        <div class="img-item" data-name="秽土转生宇智波鼬" onclick="location.href='you.html'"><img src="鼬(1).png" alt=""></div>
    </div>

    <script>
        // 已移除点击更新文字的代码
    </script>
</body>
</html>
