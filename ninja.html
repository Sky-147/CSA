<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忍者</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background: #222;
            padding: 30px;
        }
        h1 {
            color: #ffaa00;
            font-size: 45px;
            text-align: center;
            margin-bottom: 40px;
        }
        #text {
            display: none;
        }
        .img-container{
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        .img-item{
            width: 150px;
            height: 150px;
            background: #333;
            border: 2px dashed #ffaa00;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ccc;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .img-item:hover{
            transform: scale(1.05);
            border-color: #ffdd00;
            box-shadow: 0 0 15px #ffaa00;
        }
        .img-item img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <h1>忍者</h1>
    <div id="text"></div>

    <div class="img-container">
        <!-- 跳转 a.html -->
        <div class="img-item" onclick="location.href='a.html'"><img src="双神威卡卡西(1).png" alt=""></div>
        <!-- 跳转 b.html -->

        <!-- 跳转 c.html -->

        <!-- 跳转 d.html -->

        <!-- 跳转 e.html -->
        <div class="img-item" onclick="location.href='e.html'"><img src="死二(1).png" alt=""></div>

        <!-- 跳转 f.html -->
        <div class="img-item" onclick="location.href='f.html'"><img src="死柱(1).png" alt=""></div>
        <!-- 跳转 g.html -->
        <div class="img-item" onclick="location.href='g.html'"><img src="死水(1).png" alt=""></div>
        <!-- 跳转 h.html -->

        <!-- 跳转 i.html -->
