<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忍者</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #222;
            gap: 35px;
        }
        h1 {
            color: #ffaa00;
            font-size: 45px;
        }
        .box-btn {
            padding: 15px 45px;
            font-size: 19px;
            background: #ff9900;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .box-btn:hover {
            background: #ff7700;
        }
        #text {
            font-size: 22px;
            color: #fff;
        }
    </style>
</head>
<body>
    <h1>忍者</h1>
    <button class="box-btn">开启忍者之力</button>
    <div id="text"></div>

    <script>
        let txt = document.getElementById("text");
        document.querySelector(".box-btn").addEventListener("click",()=>{
            txt.innerText = "成功解锁专属忍者身份！";
        })
    </script>
</body>
</html>
