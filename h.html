<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忍者详情</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑",sans-serif;
        }
        body{
            background: #222;
            padding: 50px 30px;
        }
        h2{
            color: #ffaa00;
            text-align: center;
            font-size: 36px;
            margin-bottom: 50px;
        }
        .content{
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            gap: 40px;
            align-items: flex-start;
        }
        /* 左侧放图片区域 */
        .left-pic{
            width: 350px;
            height: 350px;
            border: 3px solid #ffaa00;
            border-radius: 12px;
            overflow: hidden;
        }
        .left-pic img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 右侧放文本区域 */
        .right-word{
            flex: 1;
            color: #ffffff;
            font-size: 17px;
            line-height: 2.2;
        }
        /* 返回按钮 */
        .back-btn{
            display: block;
            width: 130px;
            height: 45px;
            line-height: 45px;
            text-align: center;
            background: #ff9900;
            color: #000;
            text-decoration: none;
            border-radius: 8px;
            margin: 60px auto 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2>忍者名称</h2>
    <div class="content">
        <!-- 左侧图片位置 -->
        <div class="left-pic">
            <img src="填写图片文件名.png" alt="">
        </div>
        <!-- 右侧文字介绍位置 -->
        <div class="right-word">
            在此处填写忍者生平、技能、背景故事、战绩等所有文字内容
        </div>
    </div>
    <!-- 返回忍者选择主页 -->
    <a href="ninja.html" class="back-btn">返回选择页</a>
</body>
</html>
