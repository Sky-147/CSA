<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火影忍者生平</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* 新增背景图片样式 */
            background: url("主页面.jpg") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            gap: 40px;
        }
        h1 {
            color: #ff4444;
            font-size: 42px;
            text-shadow: 2px 2px 4px #000;
        }
        #btn {
            padding: 18px 50px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            background: #ff3333;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        #btn:hover {
            background: #dd2222;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>火影忍者生平</h1>
    <button id="btn">选择忍者</button>

    <script>
        document.getElementById("btn").onclick = function(){
            location.href = "ninja.html";
        }
    </script>
</body>
</html>
